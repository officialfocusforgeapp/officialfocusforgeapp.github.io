      <stop offset="0" stop-color="#ff4d42" stop-opacity="0.58"/>
      <stop offset="0.24" stop-color="#8e0c17" stop-opacity="0.64"/>
      <stop offset="0.58" stop-color="#290307" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
