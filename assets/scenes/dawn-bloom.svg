      <ellipse cx="-12" cy="0" rx="8" ry="17" fill="url(#petal)" transform="rotate(288)"/>
      <circle r="4" fill="#ffd89a"/>
    </g>
  </defs>
  <rect width="1600" height="2400" fill="url(#dawnSky)"/>
