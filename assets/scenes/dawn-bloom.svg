<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 2400" role="img" aria-label="Quiet dawn bloom scene with blossoms held to the page edges">
  <defs>
    <linearGradient id="dawn" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#6f4aa1" stop-opacity="0.42"/>
      <stop offset="0.42" stop-color="#ff86a8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#120812" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="petal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffe6ee"/>
      <stop offset="0.5" stop-color="#ff8fb2"/>
      <stop offset="1" stop-color="#ad4f92"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#8d555c"/>
      <stop offset="0.5" stop-color="#3b2332"/>
      <stop offset="1" stop-color="#1d101f"/>
    </linearGradient>
    <linearGradient id="water" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ff83a5" stop-opacity="0.38"/>
      <stop offset="0.52" stop-color="#ffd89a" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#6f4aa1" stop-opacity="0.32"/>
    </linearGradient>
    <filter id="softBloom" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1.2 0 0 0 0.16 0 0.55 0 0 0.08 0 0 1 0 0.2 0 0 0 0.5 0" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <g id="flower">
      <ellipse cx="0" cy="-13" rx="8" ry="18" fill="url(#petal)"/>
      <ellipse cx="12" cy="-2" rx="8" ry="18" fill="url(#petal)" transform="rotate(70)"/>
      <ellipse cx="8" cy="12" rx="8" ry="18" fill="url(#petal)" transform="rotate(142)"/>
      <ellipse cx="-8" cy="12" rx="8" ry="18" fill="url(#petal)" transform="rotate(218)"/>
      <ellipse cx="-12" cy="-2" rx="8" ry="18" fill="url(#petal)" transform="rotate(290)"/>
      <path d="M-4-4h8v8h-8z" fill="#ffd89a" transform="rotate(45)"/>
    </g>
  </defs>
  <rect width="1600" height="2400" fill="transparent"/>
  <rect width="1600" height="1320" fill="url(#dawn)" opacity="0.72"/>
  <path d="M0 0h182c124 342 178 680 162 1014-14 294-72 598-174 912L0 2050z" fill="url(#wood)" opacity="0.9"/>
  <path d="M1600 0h-150c-106 286-142 590-108 912 32 304 88 610 56 918l202 144z" fill="url(#wood)" opacity="0.68"/>
