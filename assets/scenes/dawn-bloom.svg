<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 2400" role="img" aria-label="Dawn bloom scene with cherry blossoms, sunrise, lake, path, petals, and warm mountains">
  <defs>
    <linearGradient id="dawnSky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#6f4aa1" stop-opacity="0.62"/>
      <stop offset="0.42" stop-color="#ff86a8" stop-opacity="0.46"/>
      <stop offset="0.68" stop-color="#ffd089" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#120812" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="sun" cx="74%" cy="34%" r="26%">
      <stop offset="0" stop-color="#fff4c6" stop-opacity="0.9"/>
      <stop offset="0.22" stop-color="#ffd89a" stop-opacity="0.56"/>
      <stop offset="0.68" stop-color="#ff83a5" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="petal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffe3ec"/>
      <stop offset="0.46" stop-color="#ff8fb2"/>
      <stop offset="1" stop-color="#b45395"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#a35b54"/>
      <stop offset="0.5" stop-color="#51303b"/>
      <stop offset="1" stop-color="#201222"/>
    </linearGradient>
    <filter id="softBloom" x="-30%" y="-30%" width="160%" height="160%">
