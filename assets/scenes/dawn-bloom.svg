      <feColorMatrix in="blur" type="matrix" values="1.4 0 0 0 0.18 0 0.65 0 0 0.08 0 0 1.2 0 0.22 0 0 0 0.58 0" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <g id="flower">
