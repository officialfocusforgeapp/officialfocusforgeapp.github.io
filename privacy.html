<style>
  :root{
    --bg: #0f0b08;
    --text: rgba(255,245,230,0.92);
    --muted: rgba(255,230,200,0.70);
    --faint: rgba(255,230,200,0.55);
    --border: rgba(255,140,60,0.25);
    --card: rgba(25,15,10,0.65);
    --shadow: 0 25px 80px rgba(0,0,0,0.65);
    --accent: #ff6a00;
    --accent2:#ffb347;
    --link: #ff9d3f;
    --radius: 18px;
    --maxw: 980px;
    --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
  }

  *{box-sizing:border-box}
  html,body{height:100%}

  body{
    margin:0;
    font-family: var(--sans);
    color: var(--text);
    line-height:1.6;

    /* 🔥 Smooth Infinite Forge Background */
    background:
      radial-gradient(1200px 800px at 20% 10%, rgba(255,110,0,0.35), transparent 60%),
      radial-gradient(1000px 700px at 85% 20%, rgba(255,170,60,0.25), transparent 60%),
      radial-gradient(1200px 900px at 50% 100%, rgba(255,80,0,0.18), transparent 70%),
      linear-gradient(180deg, #1a0f0a 0%, #0f0b08 40%, #120a06 70%, #0b0806 100%);
    
    background-attachment: fixed;
    background-repeat: no-repeat;
    background-size: cover;
  }

  a{color:var(--link); text-decoration:none}
  a:hover{text-decoration:underline}

  header{
    padding: 50px 16px 24px;
  }

  .wrap{
    max-width: var(--maxw);
    margin: 0 auto;
  }

  .logo{
    width:44px;
    height:44px;
    border-radius:14px;
    background: linear-gradient(135deg, #ff6a00, #ffb347);
    box-shadow:
      0 0 30px rgba(255,120,0,0.6),
      inset 0 0 20px rgba(255,255,255,0.15);
  }

  .pill{
    padding: 10px 14px;
    border-radius: 999px;
    border:1px solid var(--border);
    background: rgba(40,20,10,0.6);
    backdrop-filter: blur(6px);
    box-shadow: var(--shadow);
    font-size:13px;
  }

  .card{
    padding: 26px;
    border-radius: var(--radius);
    border:1px solid var(--border);
    background: var(--card);
    backdrop-filter: blur(12px);
    box-shadow: var(--shadow);
  }

  nav.toc{
    position: sticky;
    top: 20px;
    padding: 18px;
    border-radius: var(--radius);
    border:1px solid var(--border);
    background: rgba(30,15,8,0.75);
    backdrop-filter: blur(10px);
    box-shadow: var(--shadow);
  }

  nav.toc a{
    display:block;
    padding: 8px 10px;
    border-radius: 12px;
    margin: 4px 0;
    color: var(--text);
  }

  nav.toc a:hover{
    background: rgba(255,110,0,0.18);
    text-decoration:none;
  }

  .summary{
    border-left: 4px solid var(--accent);
    padding-left: 14px;
  }

  section{
    margin-top: 26px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,140,60,0.18);
  }

  .badge{
    font-size:12px;
    padding:8px 12px;
    border-radius:999px;
    border:1px solid rgba(255,140,60,0.3);
    background: rgba(255,110,0,0.12);
  }

  footer{
    padding: 40px 16px;
    color: var(--faint);
  }
</style>
