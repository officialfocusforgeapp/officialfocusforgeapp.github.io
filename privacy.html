/* =========================
   FocusForge "Cold Forge" theme overrides
   Paste at END of your existing <style>
   ========================= */

:root{
  /* cold forge palette */
  --bg: #070b12;
  --card: rgba(10, 16, 28, 0.72);
  --text: rgba(240, 248, 255, 0.92);
  --muted: rgba(240, 248, 255, 0.70);
  --faint: rgba(240, 248, 255, 0.55);
  --border: rgba(120, 200, 255, 0.18);
  --shadow: 0 22px 80px rgba(0,0,0,0.55);

  /* accents: icy blue + a tiny neon mint */
  --accent: #4fd1ff;
  --accent2: #6ee7ff;
  --link: #9be7ff;
}

/* Ensure ALL text inherits readable color */
body, main, header, footer, article, nav, section,
h1,h2,h3,h4,p,li,span,small {
  color: var(--text);
}

/* Muted text stays muted */
.muted, .small, footer {
  color: var(--muted);
}

/* Links pop but still calm */
a { color: var(--link); }
a:hover { text-decoration: underline; }

/* --- Cold forge background: smooth + continuous (no hard scroll bands) --- */
body{
  background:
    /* soft “forge glow” blooms */
    radial-gradient(1200px 800px at 18% 12%, rgba(79, 209, 255, 0.22), transparent 60%),
    radial-gradient(900px 700px at 85% 18%, rgba(110, 231, 255, 0.14), transparent 60%),
    radial-gradient(1000px 900px at 55% 110%, rgba(120, 200, 255, 0.10), transparent 65%),

    /* deep steel gradient */
    linear-gradient(180deg, #0a1222 0%, #070b12 45%, #070b12 100%);

  /* avoids “hard lines” and keeps it stable across scroll */
  background-repeat: no-repeat;
  background-size: cover;

  /* If you ever see stutter on some devices, change to: scroll */
  background-attachment: fixed;
}

/* --- Steel texture overlay (subtle, user-friendly) --- */
body::before{
  content:"";
  position: fixed;
  inset: 0;
  pointer-events:none;
  z-index: 0;

  /* layered micro-texture: brushed metal + noise-ish pattern */
  background:
    repeating-linear-gradient(
      135deg,
      rgba(255,255,255,0.028) 0px,
      rgba(255,255,255,0.028) 1px,
      rgba(0,0,0,0.00) 6px,
      rgba(0,0,0,0.00) 12px
    ),
    radial-gradient(800px 500px at 30% 30%, rgba(255,255,255,0.035), transparent 60%),
    radial-gradient(900px 600px at 70% 55%, rgba(255,255,255,0.025), transparent 62%);
  mix-blend-mode: overlay;
  opacity: 0.55;
}

/* --- Moving smoke (very subtle) --- */
body::after{
  content:"";
  position: fixed;
  inset: -20%;
  pointer-events:none;
  z-index: 0;

  background:
    radial-gradient(600px 420px at 30% 40%, rgba(180, 230, 255, 0.05), transparent 65%),
    radial-gradient(520px 360px at 70% 50%, rgba(180, 230, 255, 0.04), transparent 65%),
    radial-gradient(700px 460px at 55% 70%, rgba(180, 230, 255, 0.035), transparent 70%);
  filter: blur(18px);
  opacity: 0.70;

  animation: coldSmoke 14s ease-in-out infinite;
}

@keyframes coldSmoke{
  0%   { transform: translate3d(-1.5%, -1.0%, 0) scale(1.02); }
  50%  { transform: translate3d( 1.8%,  1.2%, 0) scale(1.04); }
  100% { transform: translate3d(-1.5%, -1.0%, 0) scale(1.02); }
}

/* Respect reduced motion settings */
@media (prefers-reduced-motion: reduce){
  body::after{ animation: none; }
}

/* Make sure your actual content sits above overlays */
header, main, footer { position: relative; z-index: 1; }

/* --- Cards + TOC: forged glass look --- */
.card, nav.toc{
  background: var(--card) !important;
  border: 1px solid var(--border) !important;
  box-shadow: var(--shadow) !important;
  backdrop-filter: blur(12px);
}

/* Make TOC hover feel “cool glow” */
nav.toc a:hover{
  background: rgba(79, 209, 255, 0.10) !important;
  border-color: rgba(79, 209, 255, 0.18) !important;
}

/* --- Logo + pill: cold forge glow --- */
.logo{
  background: linear-gradient(135deg, rgba(79,209,255,1), rgba(110,231,255,1)) !important;
  box-shadow:
    0 0 28px rgba(79,209,255,0.32),
    0 10px 30px rgba(0,0,0,0.28) !important;
}

/* status dot = icy spark */
.dot{
  background: var(--accent) !important;
  box-shadow: 0 0 0 4px rgba(79,209,255,0.18) !important;
}

/* --- Subtle “spark flicker” behind the header only --- */
header::before{
  content:"";
  position:absolute;
  inset: -40px -20px auto -20px;
  height: 220px;
  pointer-events:none;
  z-index: 0;

  background:
    radial-gradient(240px 140px at 20% 60%, rgba(79,209,255,0.12), transparent 70%),
    radial-gradient(220px 140px at 55% 40%, rgba(110,231,255,0.09), transparent 72%),
    radial-gradient(260px 160px at 85% 65%, rgba(79,209,255,0.08), transparent 74%);
  filter: blur(10px);
  opacity: 0.9;

  animation: coldFlicker 5.5s ease-in-out infinite;
}

@keyframes coldFlicker{
  0%   { opacity: 0.85; transform: translateY(0px); }
  45%  { opacity: 1.00; transform: translateY(2px); }
  100% { opacity: 0.86; transform: translateY(0px); }
}

@media (prefers-reduced-motion: reduce){
  header::before{ animation: none; }
}

/* Improve section dividers to match cold steel */
section{
  border-top-color: rgba(120, 200, 255, 0.14) !important;
}

/* Badges match cold forge */
.badge{
  background: rgba(79, 209, 255, 0.08) !important;
  border-color: rgba(120, 200, 255, 0.20) !important;
  color: var(--muted) !important;
}
